<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, Helvetica, sans-serif; background:#f3f4f6; }

.wrapper {
    max-width:1000px;
    margin:40px auto;
    background:white;
    border:1px solid #d1d5db;
}

.top-bar {
    padding:10px 15px;
    font-size:13px;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
}

.hero {
    background:#0f172a;
    color:white;
    padding:25px;
    display:grid;
    grid-template-columns:1.1fr 1fr;
    gap:20px;
}

.hero h1 { font-size:32px; margin-bottom:10px; }
.hero p { font-size:14px; color:#cbd5e1; margin-bottom:15px; }

.cta-btn {
    background:#3b82f6;
    padding:12px 18px;
    color:white;
    border:none;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

.video-box img { width:100%; border-radius:4px; }

.stats { padding:20px; text-align:center; }
.stat-grid { display:flex; justify-content:space-around; }

.lead-form {
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.form-row { display:flex; gap:10px; }

.lead-form input {
    padding:12px;
    border-radius:6px;
    border:1px solid #ddd;
}

.lead-form button {
    padding:13px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:6px;
}

.checkbox {
    font-size:12px;
    display:flex;
    gap:8px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="top-bar">
        <div><strong>Join My Community</strong></div>
        <div>4 min read</div>
    </div>

    <div class="hero">
        <div>
            <h1>Quickly Convert your Content<br>to Sales</h1>

            <p>Turn visitors into leads and customers.</p>

            <!-- ✅ FIXED BUTTON -->
            <button class="cta-btn" id="openBtn">
                Start your 14-Day Free Trial!
            </button>
        </div>

        <div class="video-box">
            <img src="Hero101.jpeg">
        </div>
    </div>

</div>

<!-- MODAL -->
<div id="leadModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);">

    <div style="background:white; max-width:420px; margin:80px auto; padding:20px; border-radius:6px;">
        
        <h2>Start Your Free Trial</h2>

        <form id="leadForm" class="lead-form">

            <div class="form-row">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
            </div>

            <input type="email" id="email" placeholder="Email Address" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>

            <label class="checkbox">
                <input type="checkbox" required>
                <span>I agree to terms</span>
            </label>

            <button type="submit">Continue</button>
        </form>

        <br>
        <button id="closeBtn">Cancel</button>

    </div>
</div>

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔑 YOUR KEYS
const supabaseUrl = "https://hevfpsefbvftaassbihn.supabase.co";
const supabaseKey = "YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ELEMENTS
const modal = document.getElementById("leadModal");
const openBtn = document.getElementById("openBtn");
const closeBtn = document.getElementById("closeBtn");
const form = document.getElementById("leadForm");

// OPEN MODAL
openBtn.addEventListener("click", () => {
    modal.style.display = "block";
});

// CLOSE MODAL
closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
});

// SUBMIT FORM
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const leadData = {
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
    };

    const { error } = await supabase
        .from("leads")
        .insert([leadData]);

    if (error) {
        console.error(error);
        alert("❌ Failed to save");
        return;
    }

    alert("✅ You're in!");

    form.reset();
    modal.style.display = "none";
});
</script>

</body>
</html>
